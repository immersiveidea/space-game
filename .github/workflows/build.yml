name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: linux_amd64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: npm ci

    - name: Run build
      run: npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=2048"

    - name: Deploy to nginx
      run: |
        rm -rf /var/www/localhost/space/*
        cp -r dist/* /var/www/localhost/space/
